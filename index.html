{id:“t0”,assetId:“BTC”,dir:“LONG”,entry:69563.3,tp:70651.9,sl:68817.8,sz:56,window:“24H”,bias:0.67,status:“CLOSED”,closePrice:70304.5,closedBy:“MANUAL”,pnl:24.31,commission:0,openTime:“2026-04-06T16:00:00Z”,closeTime:“2026-04-06T18:48:37Z”},

{id:“t3”,assetId:“GOLD”,dir:“LONG”,entry:4610.0,tp:4660.0,sl:4580.0,sz:42,window:“24H”,bias:0.68,status:“CLOSED”,closePrice:4660.0,closedBy:“TP”,pnl:17.59,commission:0,openTime:“2026-04-07T10:00:00Z”,closeTime:“2026-04-07T18:00:00Z”},
{id:“t4”,assetId:“BTC”,dir:“LONG”,entry:69000.0,tp:70000.0,sl:68000.0,sz:56,window:“24H”,bias:0.67,status:“CLOSED”,closePrice:70000.0,closedBy:“TP”,pnl:14.74,commission:0,openTime:“2026-04-07T08:00:00Z”,closeTime:“2026-04-07T20:00:00Z”},
{id:“t5”,assetId:“BTC”,dir:“LONG”,entry:68500.0,tp:69500.0,sl:67500.0,sz:56,window:“24H”,bias:0.67,status:“CLOSED”,closePrice:67500.0,closedBy:“SL”,pnl:-33.52,commission:0,openTime:“2026-04-08T08:00:00Z”,closeTime:“2026-04-08T14:00:00Z”},
{id:“t6”,assetId:“BTC”,dir:“LONG”,entry:67000.0,tp:70000.0,sl:65000.0,sz:56,window:“24H”,bias:0.70,status:“CLOSED”,closePrice:70000.0,closedBy:“TP”,pnl:119.64,commission:0,openTime:“2026-04-08T16:00:00Z”,closeTime:“2026-04-09T10:00:00Z”},
{id:“t7”,assetId:“GOLD”,dir:“LONG”,entry:3280.0,tp:3340.0,sl:3240.0,sz:42,window:“24H”,bias:0.68,status:“CLOSED”,closePrice:3340.0,closedBy:“TP”,pnl:42.66,commission:0,openTime:“2026-04-08T10:00:00Z”,closeTime:“2026-04-09T08:00:00Z”},

,{id:“t9”,assetId:“BTC”,dir:“LONG”,entry:72009.0,tp:73000.0,sl:71000.0,sz:56,window:“24H”,bias:0.67,status:“CLOSED”,closePrice:72008.2,closedBy:“SL”,pnl:-105.17,commission:0,openTime:“2026-04-08T15:00:00Z”,closeTime:“2026-04-08T15:33:20Z”}
,{id:“t10”,assetId:“BTC”,dir:“LONG”,entry:71425.0,tp:72500.0,sl:70500.0,sz:56,window:“24H”,bias:0.67,status:“CLOSED”,closePrice:71424.6,closedBy:“SL”,pnl:-110.93,commission:0,openTime:“2026-04-08T15:45:00Z”,closeTime:“2026-04-08T16:09:05Z”}
];

function saveState(){try{localStorage.setItem(“se_trades”,JSON.stringify(S.trades));localStorage.setItem(“se_balance”,JSON.stringify(S.balance));localStorage.setItem(“se_bayes”,JSON.stringify(S.bayes));localStorage.setItem(“se_sigtimes”,JSON.stringify(SIGNAL_TIMES));}catch(e){}}
function loadState(){
try{
var t=localStorage.getItem(“se_trades”);var b=localStorage.getItem(“se_balance”);var by=localStorage.getItem(“se_bayes”);var st=localStorage.getItem(“se_sigtimes”);
if(t&&JSON.parse(t).length>0){S.trades=JSON.parse(t);}
else{S.trades=TRADES_INICIALES;S.balance={initial:CAPITAL_INICIAL,current:145.14,history:[]};saveState();}
if(b)S.balance=JSON.parse(b);if(by)S.bayes=JSON.parse(by);
if(st)SIGNAL_TIMES=JSON.parse(st);
}catch(e){S.trades=TRADES_INICIALES;S.balance={initial:CAPITAL_INICIAL,current:145.14,history:[]};}
}

var S={data:{},sources:{},results:{},bayes:{},active:“BTC”,sent:{},trades:[],balance:{initial:CAPITAL_INICIAL,current:145.14,history:[]}};

function randn(){var u=0,v=0;while(!u)u=Math.random();while(!v)v=Math.random();return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);}
function simulate(id,n){var p=FB[id]||FB.BTC,pr=p.b,d=[];for(var i=0;i<n;i++){var ret=p.d+p.v*randn()+(Math.random()<0.004?(Math.random()-0.5)*p.s:0);var o=pr;pr=Math.max(pr*(1+ret),p.b*0.3);d.push({o:o,h:Math.max(o,pr)*(1+Math.abs(randn())*0.001),l:Math.min(o,pr)*(1-Math.abs(randn())*0.001),c:pr,ret:ret});}return d;}
function parseBinK(j){if(!Array.isArray(j))return null;return j.map(function(k){var o=parseFloat(k[1]),c=parseFloat(k[4]);return{o:o,h:parseFloat(k[2]),l:parseFloat(k[3]),c:c,ret:(c-o)/(o||1),t:k[0]};});}
function fetchKlines(asset){
if(!asset.binK)return Promise.resolve({candles:simulate(asset.id,1000),source:“SIM”});
return fetch(asset.binK).then(function(r){return r.json();}).then(function(j){var c=parseBinK(j);if(c&&c.length>=10)return{candles:c,source:“BIN”};throw new Error();}).catch(function(){return{candles:simulate(asset.id,1000),source:“SIM”};});
}
function fetchPrice(asset){
return fetch(MEXC(asset.mexcSym)).then(function(r){return r.json();}).then(function(j){
if(j.success&&j.price){var p=parseFloat(j.price);if(p&&p>0)return{price:p,src:“MEXC”};}
throw new Error();
}).catch(function(){
if(asset.id===“BTC”){return fetch(“https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT”).then(function(r){return r.json();}).then(function(j){var p=parseFloat(j.price);if(p&&p>0)return{price:p,src:“BIN”};throw new Error();}).catch(function(){return null;});}
return null;
});
}
function fetchHistoricalKlines(asset,since){
if(!asset.binK)return Promise.resolve([]);
return fetch(asset.binK).then(function(r){return r.json();}).then(function(j){var c=parseBinK(j);if(!c)return[];return c.filter(function(k){return k.t>=since;});}).catch(function(){return[];});
}

function fmtDuration(ms){var h=Math.floor(ms/3600000),m=Math.floor((ms%3600000)/60000);if(h>0)return h+“h “+m+“min”;return m+“min”;}

async function checkOpenTrades(){
var ot=S.trades.filter(function(t){return t.status===“OPEN”;});
if(!ot.length)return;
for(var i=0;i<ot.length;i++){
var trade=ot[i];var asset=ASSETS.find(function(a){return a.id===trade.assetId;});if(!asset)continue;
if(asset.binK){
var since=trade.lastChecked||Date.now()-3600000;
var candles=await fetchHistoricalKlines(asset,since);if(!candles.length)continue;
var hit=null;
for(var j=0;j<candles.length;j++){var c=candles[j];if(trade.dir===“LONG”){if(c.h>=trade.tp){hit={by:“TP”,price:trade.tp,time:c.t};break;}if(c.l<=trade.sl){hit={by:“SL”,price:trade.sl,time:c.t};break;}}else{if(c.l<=trade.tp){hit={by:“TP”,price:trade.tp,time:c.t};break;}if(c.h>=trade.sl){hit={by:“SL”,price:trade.sl,time:c.t};break;}}}
if(hit)closeTrade(trade.id,hit.price,hit.by,new Date(hit.time).toISOString());else trade.lastChecked=Date.now();
} else {
var cur=S.results[trade.assetId]?S.results[trade.assetId].price:null;
if(cur){
if(trade.dir===“LONG”){if(cur>=trade.tp)closeTrade(trade.id,trade.tp,“TP”,new Date().toISOString());else if(cur<=trade.sl)closeTrade(trade.id,trade.sl,“SL”,new Date().toISOString());}
else{if(cur<=trade.tp)closeTrade(trade.id,trade.tp,“TP”,new Date().toISOString());else if(cur>=trade.sl)closeTrade(trade.id,trade.sl,“SL”,new Date().toISOString());}
trade.lastChecked=Date.now();
}
}
}
saveState();
}

function syncTradesToRailway(){
try{
fetch(RAILWAY+”/trades”,{method:“POST”,headers:{“Content-Type”:“application/json”},body:JSON.stringify(S.trades.filter(function(t){return t.status===“OPEN”;}))}).catch(function(){});
}catch(e){}
}

function closeTrade(tradeId,closePrice,closedBy,closeTime){
var trade=S.trades.find(function(t){return t.id===tradeId;});if(!trade||trade.status!==“OPEN”)return;
var priceDiff=trade.dir===“LONG”?closePrice-trade.entry:trade.entry-closePrice;
var pct=priceDiff/trade.entry;
var pnl=parseFloat((S.balance.current*(trade.sz/100)*pct*APALANCAMIENTO).toFixed(2));
var commission=parseFloat((Math.abs(pnl)*0.001).toFixed(3));pnl=parseFloat((pnl-commission).toFixed(2));
trade.status=“CLOSED”;trade.closePrice=closePrice;trade.closedBy=closedBy;trade.pnl=pnl;trade.commission=commission;trade.closeTime=closeTime||new Date().toISOString();

var last=S.data[asset.id][S.data[asset.id].length-1];var newPrice=priceResult.price;
if(res.source===“SIM”){var ratio=newPrice/last.c;S.data[asset.id]=S.data[asset.id].map(function(c){return{o:c.o*ratio,h:c.h*ratio,l:c.l*ratio,c:c.c*ratio,ret:c.ret};});}

}
if(!S.bayes[asset.id]){S.bayes[asset.id]={};S.results[asset.id].windows.forEach(function(w){var a=Math.round(w.wins*w.size)+2,b=w.size-Math.round(w.wins*w.size)+2;S.bayes[asset.id][w.label]={a:a,b:b};});}
